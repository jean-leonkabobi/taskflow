<div class="stats-container">
  <div class="stat-card">
    <h3>Total</h3>
    <p>{{ totalTasks }}</p>
  </div>
  <div class="stat-card todo">
    <h3>À faire</h3>
    <p>{{ todoTasks }}</p>
  </div>
  <div class="stat-card in-progress">
    <h3>En cours</h3>
    <p>{{ inProgressTasks }}</p>
  </div>
  <div class="stat-card done">
    <h3>Terminé</h3>
    <p>{{ doneTasks }}</p>
  </div>
</div>
